<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
        .container { max-width: 800px; margin:0 auto; background:#fff; padding:20px; border-radius:8px; }
        .btn { color:#fff; background:#667eea; border:none;padding:8px 12px;border-radius:4px;text-decoration:none; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎉 Đặt hàng thành công</h1>
    <p th:text="${message}"></p>
    <p>Mã đơn hàng: <strong th:text="${order.id}"></strong></p>
    <p>Ngày: <strong th:text="${order.createdAt}"></strong></p>
    <p> Tổng sản phẩm: <strong th:text="${order.totalQuantity}"></strong></p>
    <p> Tổng tiền: <strong th:text="${#numbers.formatDecimal(order.totalAmount, 1, 'COMMA', 2, 'POINT')}"></strong></p>

    <a th:href="@{/books}" class="btn">Về danh sách sách</a>
</div>
</body>
</html>
