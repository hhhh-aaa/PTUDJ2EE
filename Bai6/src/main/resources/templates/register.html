<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="auth-page">
    <h1>Register</h1>
    <form th:action="@{/register}" th:object="${student}" method="post" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div>
            <label for="username">Username</label>
            <input type="text" th:field="*{username}" id="username" required />
        </div>
        <div>
            <label for="email">Email</label>
            <input type="email" th:field="*{email}" id="email" required />
        </div>
        <div>
            <label for="password">Password</label>
            <input type="password" th:field="*{password}" id="password" required />
        </div>
        <button type="submit">Sign up</button>
    </form>
    <div class="alt-actions">
        <a th:href="@{/login}">Already have an account? Login</a>
    </div>
</div>
</body>
</html>
