<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Book List</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<h1>Books</h1>
<div style="margin-bottom:1em;">
    <span sec:authorize="isAuthenticated()">
        Logged in as <b sec:authentication="name"></b> |
        <a th:href="@{/logout}">Logout</a>
    </span>
    <span sec:authorize="!isAuthenticated()">
        <a th:href="@{/login}">Login</a>
    </span>
</div>
<form th:action="@{/books}" method="get" style="margin-bottom:1em;">
    <input type="text" name="q" placeholder="Search by title" th:value="${query}" />
    <button type="submit">Search</button>
    <a th:href="@{/books}">Clear</a>
</form>
<a th:href="@{/books/new}" sec:authorize="hasRole('ADMIN')">Add new book</a>
<table border="1" cellspacing="0" cellpadding="5">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Price</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}">1</td>
        <td th:text="${book.title}">Title</td>
        <td th:text="${book.author}">Author</td>
        <td th:text="${book.price}">0.0</td>
        <td>
            <span sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/books/edit/{id}(id=${book.id})}">Edit</a> |
                <a th:href="@{/books/delete/{id}(id=${book.id})}"
                   onclick="return confirm('Are you sure?');">Delete</a>
            </span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
