<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${course.id} == null ? 'Add Course' : 'Edit Course'">Course</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="page">
    <header class="header">
        <h1 th:text="${course.id} == null ? 'Add Course' : 'Edit Course'"></h1>
        <div class="header-actions">
            <a th:href="@{/admin/courses}">Back</a>
        </div>
    </header>
    <main>
        <form th:action="@{/admin/courses}" th:object="${course}" method="post" class="course-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="hidden" th:field="*{id}" />
            <div class="form-row">
                <label for="name">Name</label>
                <input type="text" th:field="*{name}" id="name" required />
            </div>
            <div class="form-row">
                <label for="credits">Credits</label>
                <input type="number" th:field="*{credits}" id="credits" min="1" required />
            </div>
            <div class="form-row">
                <label for="lecturer">Lecturer</label>
                <input type="text" th:field="*{lecturer}" id="lecturer" required />
            </div>
            <div class="form-row">
                <label for="imageUrl">Image URL</label>
                <input type="text" th:field="*{imageUrl}" id="imageUrl" required />
            </div>
            <div class="form-actions">
                <button type="submit">Save</button>
                <a th:href="@{/admin/courses}">Cancel</a>
            </div>
        </form>
    </main>
</div>
</body>
</html>
