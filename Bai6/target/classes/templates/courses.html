<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8" />
    <title>Course Catalog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="page">
    <header class="header">
        <h1>Course Catalog</h1>
        <div class="header-actions">
            <form th:action="@{/courses}" method="get" class="search-form">
                <input type="text" name="q" placeholder="Search courses" th:value="${query}"/>
                <button type="submit">Search</button>
            </form>
            <div class="user-links">
                <a th:href="@{/home}">Home</a>
                <a th:href="@{/enroll/my-courses}" sec:authorize="hasRole('STUDENT')">My Courses</a>
                <a th:href="@{/admin/courses}" sec:authorize="hasRole('ADMIN')">Admin</a>
                <span sec:authorize="isAuthenticated()">
                    Logged in as <b sec:authentication="name"></b> | <a th:href="@{/logout}">Logout</a>
                </span>
                <span sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}">Login</a> |
                    <a th:href="@{/register}">Register</a>
                </span>
            </div>
        </div>
    </header>

    <main>
        <div class="course-list">
            <div th:if="${courses.isEmpty()}">No courses found.</div>
            <div class="card-grid">
                <div class="card" th:each="course : ${courses}">
                    <img th:src="${course.imageUrl != null && course.imageUrl != ''} ? course.imageUrl : '/images/default-course.svg'" alt="Course image" class="card-image"/>
                    <div class="card-body">
                        <h2 th:text="${course.name}">Course name</h2>
                        <div class="course-meta">
                            <span><strong>Credits:</strong> <span th:text="${course.credits}">0</span></span>
                            <span><strong>Lecturer:</strong> <span th:text="${course.lecturer}">Lecturer</span></span>
                        </div>
                        <div class="card-actions">
                            <form th:action="@{/enroll/{id}(id=${course.id})}" method="post" sec:authorize="hasRole('STUDENT')" th:unless="${enrolledCourseIds.contains(course.id)}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit">Enroll</button>
                            </form>
                            <span th:if="${enrolledCourseIds.contains(course.id)}" class="enrolled-label">Enrolled</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <a th:href="@{/courses(page=${currentPage - 1}, q=${query})}" th:if="${currentPage > 0}">Previous</a>
                <span>Page <span th:text="${currentPage + 1}"></span> of <span th:text="${totalPages}"></span></span>
                <a th:href="@{/courses(page=${currentPage + 1}, q=${query})}" th:if="${currentPage + 1 < totalPages}">Next</a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
