<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title th:text="${book.id} == null ? 'Add Book' : 'Edit Book'">Book</title>
</head>
<body>
<h1 th:text="${book.id} == null ? 'Add Book' : 'Edit Book'"></h1>
<form th:action="@{/books}" th:object="${book}" method="post">
    <input type="hidden" th:field="*{id}" />
    <table>
        <tr>
            <td><label for="title">Title</label></td>
            <td><input type="text" th:field="*{title}" id="title" required/></td>
        </tr>
        <tr>
            <td><label for="author">Author</label></td>
            <td><input type="text" th:field="*{author}" id="author" required/></td>
        </tr>
        <tr>
            <td><label for="price">Price</label></td>
            <td><input type="number" step="0.01" th:field="*{price}" id="price" required/></td>
        </tr>
        <tr>
            <td colspan="2"><button type="submit">Save</button>
                <a th:href="@{/books}">Cancel</a></td>
        </tr>
    </table>
</form>
</body>
</html>
